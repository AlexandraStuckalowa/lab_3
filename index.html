<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 игра</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>2048</h1>
    
    <div class="score-container">
        <span>Счет:</span>
        <span id="score">0</span>
    </div>
    
    <div class="game-container">
        <div id="grid-container">
        </div>
    </div>
    
    <div class="game-controls">
        <button id="new-game-btn">Начать заново</button>
        <button id="undo-btn">Отмена хода</button>
    </div>

        <div class="mobile-controls" id="mobile-controls">
        <button class="control-btn up" data-direction="up">⭡</button>
        <div class="mobile-row">
            <button class="control-btn left" data-direction="left">⭠</button>
            <button class="control-btn down" data-direction="down">⭣</button>
            <button class="control-btn right" data-direction="right">⭢</button>
        </div>
    </div>
    
    <button id="show-leaderboard-btn">Таблица лидеров</button>
    
            <div id="game-over-modal" class="modal">
        <div class="modal-content">
            <p id="game-over-message">Игра окончена!</p>
            <input type="text" id="player-name" placeholder="Введите ваше имя">
            <button id="save-score-btn">Сохранить результат</button>
            <button id="restart-from-modal-btn">Начать заново</button>
        </div>
    </div>

    <div id="leaderboard-modal" class="modal">
        <div class="modal-content">
            <h2>Таблица лидеров</h2>
            <table id="leaderboard-table">
                <thead>
                    <tr>
                        <th>Имя</th>
                        <th>Очки</th>
                        <th>Дата</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body">
                </tbody>
            </table>
            <button id="close-leaderboard-btn">Закрыть</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
